services:
  postgres:
    image: postgres:15
    container_name: qm-postgres
    environment:
      POSTGRES_DB: querymesh_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: qm-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/querymesh_demo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: demo
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: qm-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
